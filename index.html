<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫學決策訓練</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --danger-color: #ef4444;
            --danger-hover: #dc2828;
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --modal-bg: rgba(30, 41, 59, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16/9;
            background: #000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Glassmorphism Modal */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease-in-out;
            z-index: 10;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--modal-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            max-width: 600px;
            width: 90%;
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.scenario {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #e2e8f0;
        }

        .btn-group {
            display: flex;
            gap: 16px;
            flex-direction: column;
        }

        button {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-option-a {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }

        .btn-option-a:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-option-b {
            background-color: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-option-b:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .error-message {
            margin-top: 20px;
            padding: 16px;
            background-color: rgba(239, 68, 68, 0.1);
            border-left: 4px solid var(--danger-color);
            color: #fca5a5;
            border-radius: 8px;
            font-size: 16px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            color: #cbd5e1;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="main-video" controls muted autoplay>
            <source src="start_video.mp4" type="video/mp4">
            您的瀏覽器不支援影片標籤。
        </video>
        
        <div class="controls-hint" id="hint">影片播放中...</div>

        <!-- 決策覆蓋層 -->
        <div class="modal-overlay" id="decision-modal">
            <div class="modal-content">
                <h2>臨床決策點</h2>
                <p class="scenario">
                    <strong>王先生（68歲）：</strong> 病人，有高血壓及陳舊性心肌梗塞病史。三天前開始感冒，隨後呼吸困難加劇。
                </p>
                <div class="btn-group">
                    <button class="btn-option-a" id="btn-a">選項A：給氧氣</button>
                    <button class="btn-option-b" id="btn-b">選項B：CPR</button>
                </div>
                <div class="error-message" id="error-msg">
                    <strong>錯誤：</strong>病人目前有意識且呼吸困難，應優先給予氧氣支持，不需要進行 CPR。請重新選擇。
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('main-video');
        const modal = document.getElementById('decision-modal');
        const btnA = document.getElementById('btn-a');
        const btnB = document.getElementById('btn-b');
        const errorMsg = document.getElementById('error-msg');
        const hint = document.getElementById('hint');

        let questionShown = false;

        // 監聽影片播放時間
        video.addEventListener('timeupdate', () => {
            // 在第 5 秒時暫停並顯示問答 (因為 timeupdate 不是逐毫秒觸發，所以用範圍判斷)
            if (video.currentTime >= 5 && !questionShown) {
                video.pause();
                questionShown = true; // 確保只顯示一次
                showModal();
            }
        });

        video.addEventListener('play', () => {
            hint.style.display = 'none';
        });

        function showModal() {
            modal.classList.add('active');
        }

        function hideModal() {
            modal.classList.remove('active');
            errorMsg.style.display = 'none'; // 重置錯誤訊息
        }

        // 選項 A：給氧氣
        btnA.addEventListener('click', () => {
            hideModal();
            // 播放選項 A 對應的影片（已存在於您的資料夾內）
            video.src = '急診心衰竭肺水腫劇本.mp4';
            video.load();
            video.play();
        });

        // 選項 B：CPR
        btnB.addEventListener('click', () => {
            // 顯示錯誤訊息，不更換影片
            errorMsg.style.display = 'block';
        });

    </script>
</body>
</html>
